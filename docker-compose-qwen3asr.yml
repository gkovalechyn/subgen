#docker-compose-qwen3asr.yml
version: '2'
services:
  subgen-qwen3asr:
    container_name: subgen-qwen3asr
    tty: true
    build:
      context: .
      dockerfile: Dockerfile.qwen3asr
    environment:
       - "WHISPER_MODEL=Qwen/Qwen3-ASR-1.7B"
       - "WEBHOOKPORT=9000"
       - "CONCURRENT_TRANSCRIPTIONS=1"
       - "TRANSCRIBE_DEVICE=cuda"
       - "DEBUG=True"
       - "CLEAR_VRAM_ON_COMPLETE=True"
       - "MODEL_PATH=./models"
       - "APPEND=False"
       - "USE_FORCED_ALIGNER=True"
       - "FORCED_ALIGNER_MODEL=Qwen/Qwen3-ForcedAligner-0.6B"
       - "MAX_NEW_TOKENS=256"
       - "MAX_INFERENCE_BATCH_SIZE=4"
       - "DETECT_LANGUAGE_LENGTH=30"
       # - "FORCE_DETECTED_LANGUAGE_TO=en"
       # - "HUGGINGFACE_TOKEN=hf_..."
    volumes:
       - "${APPDATA}/subgen/models:/subgen/models"
    ports:
       - "9000:9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
